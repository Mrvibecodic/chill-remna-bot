<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Кабинет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="qrcode.min.js"></script>
<style>
:root{
  /* premium dark palette — independent of TG theme, but accent picks up tg.button_color */
  --bg:#0b0f17;
  --bg-2:#0e1320;
  --surface:rgba(255,255,255,.045);
  --surface-2:rgba(255,255,255,.07);
  --stroke:rgba(255,255,255,.10);
  --stroke-strong:rgba(255,255,255,.18);
  --text:#eef2f8;
  --muted:#8b94a7;
  --muted-2:#5f6877;
  --accent:var(--tg-theme-button-color,#5b8cff);
  --accent-2:#9d7bff;
  --accent-text:#fff;
  --good:#34d399;
  --good-glow:rgba(52,211,153,.35);
  --bad:#f87171;
  --radius:20px;
  --radius-sm:14px;
  --space:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* global icon sizing — inline SVGs have no intrinsic size, must be capped */
svg{width:18px;height:18px;flex:none;vertical-align:middle}
.hero .top svg{width:24px;height:24px;color:var(--accent);opacity:.85}
.status svg{width:15px;height:15px}
.until svg{width:15px;height:15px}
.sec-title svg{width:15px;height:15px}
/* animated ambient background */
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background:
  radial-gradient(120% 80% at 50% -10%,rgba(91,140,255,.16),transparent 60%),
  linear-gradient(180deg,var(--bg-2),var(--bg) 40%)}
.bg::before,.bg::after{content:"";position:absolute;width:60vmax;height:60vmax;border-radius:50%;filter:blur(70px);opacity:.45}
.bg::before{background:radial-gradient(circle,var(--accent),transparent 60%);top:-25vmax;left:-15vmax;animation:drift1 18s ease-in-out infinite alternate}
.bg::after{background:radial-gradient(circle,var(--accent-2),transparent 60%);bottom:-25vmax;right:-15vmax;animation:drift2 22s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(12vmax,8vmax) scale(1.15)}}
@keyframes drift2{to{transform:translate(-12vmax,-6vmax) scale(1.1)}}

.wrap{max-width:520px;margin:0 auto;padding:calc(var(--safe-top) + 12px) var(--space) calc(var(--safe-bot) + 24px)}

/* view transition */
#app{animation:viewIn .42s cubic-bezier(.22,1,.36,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.stagger>*{opacity:0;animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.07s}
.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.17s}
.stagger>*:nth-child(5){animation-delay:.22s}
.stagger>*:nth-child(6){animation-delay:.27s}
.stagger>*:nth-child(7){animation-delay:.32s}
.stagger>*:nth-child(8){animation-delay:.37s}
@keyframes rise{to{opacity:1;transform:none}}

/* header */
.head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 18px}
.head h1{font-size:19px;font-weight:700;letter-spacing:-.2px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  padding:7px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--stroke);backdrop-filter:blur(12px)}
.chip svg{width:15px;height:15px;opacity:.9}

/* glass card */
.card{position:relative;background:var(--surface);border:1px solid var(--stroke);
  border-radius:var(--radius);padding:18px;margin-bottom:14px;backdrop-filter:blur(18px) saturate(140%);
  box-shadow:0 8px 30px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.06)}
.card.glow{border-color:var(--stroke-strong);box-shadow:0 10px 40px rgba(91,140,255,.20),inset 0 1px 0 rgba(255,255,255,.08)}

/* hero subscription */
.hero{overflow:hidden}
.hero .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.status{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 var(--good-glow);animation:pulse 2.2s infinite}
.dot.off{background:var(--muted-2);animation:none;box-shadow:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--good-glow)}70%{box-shadow:0 0 0 10px transparent}100%{box-shadow:0 0 0 0 transparent}}
.hero .title{font-size:27px;font-weight:800;letter-spacing:-.5px;margin:10px 0 2px;
  background:linear-gradient(120deg,#fff,#cdd6ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.until{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--accent);
  background:color-mix(in srgb,var(--accent) 16%,transparent);padding:7px 12px;border-radius:12px;margin-top:8px;max-width:100%}
.metric{display:flex;align-items:center;justify-content:space-between;margin-top:16px;
  padding-top:14px;border-top:1px solid var(--stroke)}
.metric .l{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:14px}
.metric .l svg{width:18px;height:18px;opacity:.8}
.metric b{font-size:15px;font-variant-numeric:tabular-nums}

.linkbox{margin-top:14px}
.linkbox .lab{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;
  word-break:break-all;color:var(--text);background:rgba(0,0,0,.25);border:1px solid var(--stroke);
  border-radius:12px;padding:11px 12px;line-height:1.5}

/* buttons */
.btn{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:0;border-radius:14px;font-weight:650;font-size:15.5px;padding:15px;margin-top:10px;cursor:pointer;
  color:var(--accent-text);overflow:hidden;
  background:linear-gradient(120deg,var(--accent),var(--accent-2));
  box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 40%,transparent);
  transition:transform .12s ease,box-shadow .12s ease}
.btn svg{width:18px;height:18px}
.btn:active{transform:scale(.975)}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
  transform:translateX(-130%);transition:transform .6s}
.btn:active::after{transform:translateX(130%)}
.btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--stroke);box-shadow:none;backdrop-filter:blur(12px);font-weight:600}
.btn.sec:active{background:var(--surface-2)}
.btn.ghost{background:transparent;border:1px solid var(--stroke);box-shadow:none;color:var(--muted);font-weight:600}

/* plan cards */
.sec-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin:20px 4px 12px;display:flex;align-items:center;gap:8px}
.plan{position:relative;display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:16px 18px;margin-bottom:10px;
  cursor:pointer;backdrop-filter:blur(12px);transition:transform .12s ease,border-color .2s ease,background .2s ease}
.plan:active{transform:scale(.98)}
.plan .pl{display:flex;flex-direction:column;gap:2px}
.plan .pm{font-size:16px;font-weight:700}
.plan .ps{font-size:12px;color:var(--muted)}
.plan .price{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.plan.best{border-color:transparent;background:
  linear-gradient(var(--bg-2),var(--bg-2)) padding-box,
  linear-gradient(120deg,var(--accent),var(--accent-2)) border-box;
  box-shadow:0 10px 30px color-mix(in srgb,var(--accent) 22%,transparent)}
.plan.best::before{content:"ВЫГОДНО";position:absolute;top:-8px;right:14px;font-size:9.5px;font-weight:800;letter-spacing:.6px;
  padding:3px 8px;border-radius:999px;color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent-2));box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 45%,transparent)}

/* input */
.field{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--stroke);border-radius:12px;
  color:var(--text);padding:14px;font-size:15px;outline:none;transition:border-color .2s}
.field:focus{border-color:var(--accent)}
input[type=file].field{padding:10px 12px;color:var(--muted);cursor:pointer;line-height:1.2}
input[type=file].field::file-selector-button{font:inherit;font-weight:600;color:var(--text);background:var(--surface-2);border:1px solid var(--stroke);border-radius:10px;padding:9px 14px;margin-right:12px;cursor:pointer;transition:background .15s}
input[type=file].field::file-selector-button:hover{background:var(--surface)}
.field::placeholder{color:var(--muted-2)}

.hint{color:var(--muted);font-size:13.5px}
.hint.center{text-align:center;margin-top:10px}
.err{color:var(--bad);font-size:14.5px;font-weight:500}
/* plan feature list */
.feat{margin-bottom:14px}
.frow{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--surface);border:1px solid var(--stroke);border-bottom:0;backdrop-filter:blur(12px)}
.frow:first-child{border-radius:14px 14px 0 0}
.frow:last-child{border-bottom:1px solid var(--stroke);border-radius:0 0 14px 14px}
.frow:only-child{border-radius:14px}
.frow .l{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}
.frow b{font-size:14.5px;font-variant-numeric:tabular-nums}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip2{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:7px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--stroke);backdrop-filter:blur(10px)}
.flag{width:21px;height:15px;border-radius:3px;object-fit:cover;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.14)}

/* skeletons */
.sk{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--stroke);border-radius:var(--radius)}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
.sk-line{height:13px;border-radius:7px;background:rgba(255,255,255,.08);position:relative;overflow:hidden}
.sk-line::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shimmer 1.5s infinite}
.sk-hero{height:188px;border-radius:var(--radius);margin-bottom:14px}
.sk-row{height:64px;border-radius:16px;margin-bottom:10px}
.toast{position:fixed;left:50%;bottom:calc(var(--safe-bot) + 22px);transform:translateX(-50%) translateY(20px);
  background:rgba(20,26,38,.92);border:1px solid var(--stroke-strong);color:var(--text);font-size:14px;font-weight:600;
  padding:12px 18px;border-radius:14px;backdrop-filter:blur(16px);box-shadow:0 12px 40px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;display:flex;align-items:center;gap:9px;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px;flex:0 0 auto}
.cmodal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:22px;
  background:rgba(4,7,12,.62);backdrop-filter:blur(6px);opacity:0;transition:opacity .2s}
.cmodal.show{display:flex;opacity:1}
.cmodal-card{width:100%;max-width:360px;background:var(--surface-2);border:1px solid var(--stroke-strong);
  border-radius:var(--radius);padding:20px;backdrop-filter:blur(24px) saturate(140%);
  box-shadow:0 24px 70px rgba(0,0,0,.6);transform:translateY(10px) scale(.98);transition:transform .2s}
.cmodal.show .cmodal-card{transform:none}
.cmodal-msg{font-size:14.5px;line-height:1.5;color:var(--text);white-space:pre-line;margin-bottom:18px}
.cmodal-btns{display:flex;gap:10px}
.cmodal-btns .btn{margin-top:0}
.qrbox{background:#fff;padding:10px;border-radius:14px;line-height:0;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.seg{display:flex;gap:6px;background:var(--surface);border:1px solid var(--stroke);border-radius:12px;padding:4px;margin:16px 0 10px}
.segbtn{flex:1;border:0;background:transparent;color:var(--muted);font-weight:600;font-size:14px;padding:10px;border-radius:9px;cursor:pointer;transition:background .2s,color .2s;font-family:inherit}
.segbtn.on{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#fff}
.appc{background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:14px;margin-bottom:10px;backdrop-filter:blur(12px)}
.appc.feat{border-color:transparent;background:linear-gradient(var(--bg-2),var(--bg-2)) padding-box,linear-gradient(120deg,var(--accent),var(--accent-2)) border-box}
.apphead{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.appname{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.appdesc{font-size:12.5px;color:var(--muted);margin:6px 0 2px}
.fbadge{font-size:9.5px;font-weight:800;letter-spacing:.5px;padding:3px 8px;border-radius:999px;color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent-2))}
.pass{position:relative;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,#26305a,#3c2668 48%,#143a52);box-shadow:0 12px 30px rgba(91,140,255,.22);margin-bottom:14px}
.pass .sheen{position:absolute;inset:0;background:linear-gradient(115deg,transparent 33%,rgba(255,255,255,.12) 49%,transparent 64%);pointer-events:none}
.pass .ph{position:relative;padding:15px 16px 13px}
.pass .pl{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pass .brand{font-size:11px;font-weight:800;letter-spacing:1.6px;color:#cdd6ff}
.pass .pstat{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#bdf3da}
.pass .route{display:flex;align-items:center;justify-content:space-between;color:#fff}
.pass .route .pt{font-size:17px;font-weight:800}
.pass .route .pic svg{color:#9fb4e8}
.pass .route .ln{flex:1;height:2px;margin:0 10px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.38) 0 5px,transparent 5px 10px)}
.pass .perf{position:relative;border-top:1.5px dashed rgba(255,255,255,.28);margin:0 16px}
.pass .stub{display:flex;justify-content:space-between;padding:13px 18px 15px}
.pass .stub .c .k{font-size:9px;letter-spacing:1px;color:#9aa3ba;margin-bottom:3px}
.pass .stub .c .v{font-size:14px;font-weight:800;color:#fff}
.pass .stub .c:nth-child(2){text-align:center}
.pass .stub .c:last-child{text-align:right}
body.web .wrap{max-width:960px}
.ublock{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:11px 13px;margin-bottom:14px;backdrop-filter:blur(12px)}
.uava{width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent-2))}
.uinfo{flex:1;min-width:0}
.uname{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usub{font-size:12px;color:var(--muted)}
.ulogout{width:auto;margin:0;padding:9px 13px;font-size:13px;flex:none}
.cols{display:flex;flex-direction:column;gap:10px}
@media(min-width:700px){
  body.web .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  body.web .cols>.plan,body.web .cols>.appc{margin-bottom:0}
}
.coins{display:flex;justify-content:center;margin-top:14px}
.coins svg{width:128px;height:48px}
.payhead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.payhead .title{margin:6px 0 0}
.bigprice{font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;white-space:nowrap;background:linear-gradient(120deg,#fff,#cdd6ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
/* ---- web cabinet desktop layout: independent design, grouped, never stretched ---- */
.seg{flex-wrap:wrap}
.segbtn{flex:1 1 auto;min-width:96px}
.btnrow .btn{margin-top:10px}
body.web .authwrap{max-width:480px;margin:0 auto}
.tgwrap{display:flex;justify-content:center;margin:2px 0 8px;min-height:50px}
#tglogin{width:100%;display:flex;justify-content:center}
#tglogin iframe{background:transparent !important;border-radius:12px !important;color-scheme:normal}
.authcard{padding:22px 20px 20px}
.authwrap .card{padding:20px}
.authwrap .field{padding:14px 15px;font-size:15px}
.authwrap .btn{height:50px}
@media(min-width:700px){
  body.web .acctgrp{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:stretch;margin-bottom:16px}
  body.web .acctgrp>.ublock,body.web .acctgrp>.pass{margin-bottom:0}
  body.web .acctgrp>.ublock{align-self:start}
  body.web .btnrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  body.web .btnrow>.btn{margin-top:0}
  body.web .sec-title{margin-top:26px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="head">
    <h1>Личный кабинет</h1>
    <span id="balchip" class="chip" style="display:none" onclick="openMore()"></span>
  </div>
  <div id="app">
    <div class="sk sk-hero"></div>
    <div class="sk sk-row"></div>
    <div class="sk sk-row"></div>
    <div class="sk sk-row"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const tg=window.Telegram&&window.Telegram.WebApp;
/* ---- icons ---- */
const IC={
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/><path d="M21 12h-6a2 2 0 0 0 0 4h6v-4Z"/></svg>',
  device:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>',
  login:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  gift:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v9h14v-9"/><path d="M12 8v13"/><path d="M12 8H8.5a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8Z"/><path d="M12 8h3.5a2.5 2.5 0 0 0 0-5C13 3 12 8 12 8Z"/></svg>',
  bolt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/></svg>',
  help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>',

async function authenticate(){
  if(!tg||!tg.initData)throw new Error('Откройте через Telegram');
  const a=await api('/api/miniapp/auth',{method:'POST',body:JSON.stringify({init_data:tg.initData}),noRetry:true});
  TOKEN=a.token;return TOKEN;
}
function mkErr(status,msg){var e=new Error(msg||('http '+status));e.status=status;return e;}
async function api(path,opts={}){
  const h=Object.assign({'Content-Type':'application/json'},opts.headers||{});
  if(TOKEN)h['Authorization']='Bearer '+TOKEN;
  const r=await fetch(path,Object.assign({},opts,{headers:h}));
  if(r.status===401&&!opts.noRetry&&!WEB&&tg&&tg.initData){
    await authenticate();
    const h2=Object.assign({'Content-Type':'application/json'},opts.headers||{});
    h2['Authorization']='Bearer '+TOKEN;
    const r2=await fetch(path,Object.assign({},opts,{headers:h2}));
    if(!r2.ok)throw mkErr(r2.status,null);
    return r2.json();
  }
  if(!r.ok){var em=null;try{var j=await r.json();if(j&&j.error)em=j.error;}catch(e){}throw mkErr(r.status,em);}
  return r.json();
}
async function post(path,body){return api(path,{method:'POST',body:JSON.stringify(body||{})});}

let toastT=null;
function toast(msg,kind){

  t.innerHTML=(kind==='ok'?IC.check:kind==='err'?IC.help:'')+'<span>'+esc(msg)+'</span>';
  t.style.color=kind==='err'?'var(--bad)':kind==='ok'?'var(--good)':'var(--text)';

function copyDone(ok){if(ok){haptic('ok');toast('Скопировано','ok');}else{haptic('err');toast('Не удалось скопировать','err');}}
function fallbackCopy(t){try{var ta=document.createElement('textarea');ta.value=t;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,String(t).length);var ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}catch(e){return false;}}
function copy(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){copyDone(true);},function(){copyDone(fallbackCopy(t));});
    return;
  }
  copyDone(fallbackCopy(t));
}

function confirmAsk(msg,cb,opts){
  if(tg&&tg.showConfirm){try{tg.showConfirm(msg,function(ok){cb(!!ok);});return;}catch(e){}}

}
// showModalConfirm is the in-app confirmation used on the web cabinet (and as a
// fallback in Telegram if tg.showConfirm is unavailable) — a styled dialog in the
// app's own look, instead of the browser's default window.confirm.
function showModalConfirm(msg,cb,opts){
  var ov=document.getElementById('cmodal');
  if(!ov){
    ov=document.createElement('div');ov.id='cmodal';ov.className='cmodal';
    ov.innerHTML='<div class="cmodal-card" role="dialog" aria-modal="true"><div class="cmodal-msg"></div><div class="cmodal-btns"><button class="btn sec" data-no></button><button class="btn" data-yes></button></div></div>';
    document.body.appendChild(ov);
  }
  var done=false;
  function finish(v){if(done)return;done=true;ov.classList.remove('show');document.removeEventListener('keydown',onKey);setTimeout(function(){cb(v);},120);}
  function onKey(e){if(e.key==='Escape')finish(false);else if(e.key==='Enter')finish(true);}
  ov.querySelector('.cmodal-msg').textContent=msg;
  var yes=ov.querySelector('[data-yes]'),no=ov.querySelector('[data-no]');
  yes.textContent=(opts&&opts.yes)||'Да';
  no.textContent=(opts&&opts.no)||'Отмена';
  yes.onclick=function(){finish(true);};
  no.onclick=function(){finish(false);};
  ov.onclick=function(e){if(e.target===ov)finish(false);};
  document.addEventListener('keydown',onKey);
  void ov.offsetWidth;ov.classList.add('show');
}

/* ---- connect (apps + deeplinks + QR) ---- */
var CONNECT=null,CONNECT_KEY='';
function detectOS(){
  try{var p=(tg&&tg.platform)||'';if(p==='ios')return 'ios';if(p==='android')return 'android';if(p==='windows')return 'windows';if(p==='linux')return 'linux';if(p==='macos')return WEB?'macos':'ios';}catch(e){}
  var ua=(navigator.userAgent||'').toLowerCase();
  if(/iphone|ipad|ipod/.test(ua))return 'ios';
  if(/android/.test(ua))return 'android';
  if(/windows|win64|win32/.test(ua))return 'windows';
  if(/mac os|macintosh/.test(ua))return WEB?'macos':'ios';
  if(/linux|x11|cros/.test(ua))return 'linux';
  return WEB?'windows':'android';
}
// all platforms the backend returned (with a legacy ios/android fallback)
function cnPlatforms(){
  if(CONNECT&&CONNECT.platforms&&CONNECT.platforms.length)return CONNECT.platforms;
  var out=[];
  if(CONNECT&&CONNECT.android&&CONNECT.android.length)out.push({key:'android',label:'Android',apps:CONNECT.android});
  if(CONNECT&&CONNECT.ios&&CONNECT.ios.length)out.push({key:'ios',label:'iPhone / iOS',apps:CONNECT.ios});
  return out;
}
function curPlatform(){var ps=cnPlatforms();for(var i=0;i<ps.length;i++)if(ps[i].key===CONNECT_KEY)return ps[i];return ps[0]||null;}
function connectList(){var p=curPlatform();return (p&&p.apps)||[];}
var APP_CONFIG_PATHS=['/assets/.app-config-v2.json','/assets/app-config.json','/assets/app-config-v2.json'];
function subOrigin(u){try{return new URL(u).origin;}catch(e){return '';}}
function locJS(m,lang){if(!m||typeof m!=='object')return '';return m[lang]||m.en||m.ru||(function(){for(var k in m){if(m[k])return m[k];}return '';})();}
function substJS(t,sub,user){return String(t==null?'':t).split('{{SUBSCRIPTION_LINK}}').join(sub).split('{{USERNAME}}').join(user||'');}
function deeplinkStd(scheme,sub){if(!scheme||!sub)return '';return scheme.charAt(scheme.length-1)==='='?(scheme+encodeURIComponent(sub)):(scheme+sub);}
function parseConfig(j,sub,user,lang){
  var res={ios:[],android:[]};
  if(!j||!j.platforms)return res;
  ['ios','android'].forEach(function(os){
    var p=j.platforms[os];if(!p)return;
    if(Array.isArray(p)){
      p.forEach(function(ap){
        var dto={name:ap.name,featured:!!ap.isFeatured,deeplink:deeplinkStd(ap.urlScheme,sub),add_desc:locJS(ap.addSubscriptionStep&&ap.addSubscriptionStep.description,lang),installs:[]};
        ((ap.installationStep&&ap.installationStep.buttons)||[]).forEach(function(b){if(b.buttonLink)dto.installs.push({text:locJS(b.buttonText,lang),url:b.buttonLink});});
        if(dto.deeplink||dto.installs.length)res[os].push(dto);
      });
    }else if(p.apps&&p.apps.length){
      p.apps.forEach(function(ap){
        var dto={name:ap.name,featured:!!ap.featured,deeplink:'',add_desc:'',installs:[]};
        (ap.blocks||[]).forEach(function(bl){(bl.buttons||[]).forEach(function(b){
          if(b.type==='subscriptionLink'){if(!dto.deeplink&&b.link){dto.deeplink=substJS(b.link,sub,user);if(!dto.add_desc)dto.add_desc=locJS(bl.description,lang);}}
          else if(b.type==='external'){if(b.link)dto.installs.push({text:locJS(b.text,lang),url:substJS(b.link,sub,user)});}
        });});
        if(dto.deeplink||dto.installs.length)res[os].push(dto);
      });
    }
    res[os].sort(function(a,b){return (b.featured?1:0)-(a.featured?1:0);});
  });
  return res;
}
async function fetchConfigClient(sub,user,lang){
  var origin=subOrigin(sub);if(!origin)return null;
  for(var i=0;i<APP_CONFIG_PATHS.length;i++){
    try{
      var r=await fetch(origin+APP_CONFIG_PATHS[i]);
      if(!r.ok)continue;
      var txt=await r.text();
      if(!txt||txt.replace(/^\s+/,'').charAt(0)==='<')continue;
      var j=JSON.parse(txt);
      var res=parseConfig(j,sub,user,lang);
      if(res.ios.length||res.android.length)return res;
    }catch(e){}
  }
  return null;
}
async function openConnect(){
  haptic('tap');skSimple();setBack(boot);
  try{
    var d=await api('/api/miniapp/connect');CONNECT=d;
    var ps=cnPlatforms();var want=detectOS();
    CONNECT_KEY=(ps.some(function(p){return p.key===want;})?want:((ps[0]&&ps[0].key)||''));
    renderConnect();
  }catch(e){haptic('err');toast('Ошибка: '+e.message,'err');boot();}
}
function setPlat(key){haptic('tap');CONNECT_KEY=key;renderConnect();}
function drawQR(text){
  if(!text)return;
  var el=document.getElementById('qrbox');if(!el)return;
  try{
    if(typeof qrcode==='undefined'){var w=document.getElementById('qrwrap');if(w)w.style.display='none';return;}
    var qr=qrcode(0,'M');qr.addData(text);qr.make();
    el.innerHTML=qr.createSvgTag({cellSize:4,margin:1,scalable:true});
    var svg=el.querySelector('svg');if(svg){svg.removeAttribute('width');svg.removeAttribute('height');svg.style.width='150px';svg.style.height='150px';svg.style.display='block';}
  }catch(e){var w=document.getElementById('qrwrap');if(w)w.style.display='none';}
}
function renderConnect(){
  var d=CONNECT||{};
  var h='<div class="stagger"><div class="card hero glow"><div class="top"><span class="status">'+IC.download+' Подключение</span>'+IC.globe+'</div>'+
    '<div class="title">Установите приложение</div><div class="hint" style="margin-top:4px">Установите приложение и нажмите «Добавить подписку» — она импортируется сама.</div>';
  if(d.sub_url)h+='<div id="qrwrap" style="display:flex;flex-direction:column;align-items:center;margin-top:16px"><div id="qrbox" class="qrbox"></div>'+
    '<div class="hint center" style="margin-top:8px">Наведите камеру другого устройства, чтобы перенести подписку</div></div>';
  h+='</div>';
  var ps=cnPlatforms();
  if(ps.length>1){
    h+='<div class="seg">';
    ps.forEach(function(p){h+='<button class="segbtn'+(p.key===CONNECT_KEY?' on':'')+'" onclick="setPlat(\''+jsq(p.key)+'\')">'+esc(p.label)+'</button>';});
    h+='</div>';
  }
  var list=connectList();
  var grid=list.length>1;
  if(!list.length){
    h+='<div class="hint center" style="margin-top:16px">Список приложений недоступен. Скопируйте ссылку и добавьте её в приложение вручную.</div>';
    if(d.sub_url)h+='<button class="btn sec" style="margin-top:10px" onclick="copy(\''+jsq(d.sub_url)+'\')">'+IC.copy+'Скопировать ссылку</button>';
  }
  if(grid)h+='<div class="cols">';
  list.forEach(function(ap){
    h+='<div class="appc'+(ap.featured?' feat':'')+'"><div class="apphead"><span class="appname">'+esc(ap.name)+(ap.featured?'<span class="fbadge">Рекомендуем</span>':'')+'</span></div>';
    if(ap.add_desc)h+='<div class="appdesc">'+esc(ap.add_desc)+'</div>';
    if(ap.deeplink)h+='<button class="btn" onclick="openDeep(\''+jsq(ap.deeplink)+'\')">'+IC.plus+'Добавить подписку</button>';
    (ap.installs||[]).forEach(function(b){
      h+='<button class="btn sec" onclick="openL(\''+jsq(b.url)+'\')">'+IC.download+esc(b.text||'Установить')+'</button>';
    });
    h+='</div>';
  });
  if(grid)h+='</div>';
  h+='<button class="btn ghost" style="margin-top:16px" onclick="boot()">← Назад</button></div>';
  view(h,boot);
  drawQR(d.sub_url);
}
/* ---- web cabinet login ---- */
function cabVal(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function cabLogout(){clearToken();renderLogin();}
async function renderLogin(){
  setBack(null);
  var cfg={};try{cfg=await api('/api/cabinet/config');}catch(e){}
  var h='<div class="stagger"><div class="authwrap"><div class="card hero glow authcard"><div class="top"><span class="status">'+IC.login+' Вход</span></div>'+
    '<div class="title">Личный кабинет</div><div class="hint" style="margin-top:6px">Войдите через Telegram или по email.</div></div>';
  if(cfg.bot_username)h+='<div class="sec-title">'+IC.bolt+'Через Telegram</div><div class="tgwrap"><div id="tglogin"></div></div>';
  h+='<div class="sec-title">'+IC.tag+'По email</div><div class="card">'+
    '<input id="lemail" class="field" type="email" placeholder="Email" autocomplete="email">'+
    '<input id="lpass" class="field" style="margin-top:10px" type="password" placeholder="Пароль (мин. 8)" autocomplete="current-password">'+
    '<button class="btn" style="margin-top:10px" onclick="cabLogin(this)">'+IC.check+'Войти</button>'+
    '<button class="btn sec" style="margin-top:10px" onclick="cabRegister(this)">'+IC.plus+'Зарегистрироваться</button>'+
    '<div class="hint" style="margin-top:8px;font-size:12px">Регистрация без подтверждения почты. Восстановление пароля недоступно — сохраните пароль.</div></div>';
  h+='</div></div>';
  view(h,null);
  if(cfg.bot_username){var sc=document.createElement('script');sc.async=true;sc.src='https://telegram.org/js/telegram-widget.js?22';
    sc.setAttribute('data-telegram-login',cfg.bot_username);sc.setAttribute('data-size','large');sc.setAttribute('data-onauth','onTGAuth(user)');sc.setAttribute('data-request-access','write');
    var m=document.getElementById('tglogin');if(m)m.appendChild(sc);}
}
window.onTGAuth=function(user){renderLoginBusy();post('/api/cabinet/auth/telegram',user).then(function(r){if(r&&r.token){TOKEN=r.token;setStoredToken(r.token);boot();}else{toast('Не удалось войти','err');renderLogin();}}).catch(function(e){toast(e.message||'Ошибка входа','err');renderLogin();});};
function renderLoginBusy(){skSimple();}
async function cabEmail(path,el){
  var email=cabVal('lemail'),pass=cabVal('lpass');
  if(!email||!pass){toast('Заполните email и пароль','err');return;}
  haptic('tap');busy(el,true);
  try{var r=await post(path,{email:email,password:pass});if(r&&r.token){TOKEN=r.token;setStoredToken(r.token);boot();return;}toast('Не удалось','err');}
  catch(e){toast(e.message||'Ошибка','err');}
  busy(el,false);
}
function cabLogin(el){cabEmail('/api/cabinet/auth/login',el);}
function cabRegister(el){cabEmail('/api/cabinet/auth/register',el);}

/* ---- boot ---- */
async function boot(){
  setBack(null);
  payGuardOff();
  try{
    if(WEB){
      if(!TOKEN)TOKEN=getStoredToken();
      if(!TOKEN){renderLogin();return;}
    }else if(!tg||!tg.initData){view('<div class="card err">Откройте через Telegram.</div>',null);return;}
    skMain();
    if(!WEB)await authenticate();
    const [me,menu,sub,plans]=await Promise.all([
      api('/api/miniapp/me'),api('/api/miniapp/menu'),
      api('/api/miniapp/subscription'),api('/api/miniapp/plans')]);
    STATE.balanceK=me.balance_kopecks||0; STATE.methods=menu.pay_methods||[]; STATE.menu=menu; STATE.lang=me.lang||'ru'; STATE.me_name=me.name||''; STATE.me_email=me.email||'';
    balchip.style.display='inline-flex';
    balchip.innerHTML=IC.wallet+rub(STATE.balanceK)+' ₽';
    render(me,menu,sub,plans);
  }catch(e){if(WEB&&e.status===401){clearToken();renderLogin();return;}view('<div class="card err">Не удалось загрузить: '+esc(e.message)+'</div>',null);}
}
boot();
