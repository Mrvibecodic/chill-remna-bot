name: security

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC — catch newly-disclosed CVEs

permissions:
  contents: read

jobs:
  # Hard gate: fails the run if any known vulnerability is reachable from our code.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # Informational: surfaces lint findings without blocking (does not gate merges).
  golangci-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - uses: golangci/golangci-lint-action@v8
        with:
          # v8 installs golangci-lint v2, which is built with Go 1.25 and so
          # matches this module's toolchain (v1 binaries are built with Go 1.24
          # and refuse to lint a go1.25 target).
          version: latest
          args: --timeout=5m

  # Informational: static security analysis; uploads SARIF to the Security tab.
  gosec:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec.sarif ./..."
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
