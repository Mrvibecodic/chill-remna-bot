name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: remnabot
          POSTGRES_PASSWORD: remnabot
          POSTGRES_DB: remnabot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U remnabot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_DSN: postgres://remnabot:remnabot@localhost:5432/remnabot?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - run: go vet ./...
      - run: go test ./... -count=1
