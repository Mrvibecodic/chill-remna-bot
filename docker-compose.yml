# chill-remna-bot — основной файл деплоя (готовый образ из GHCR).
# Сценарий (см. УСТАНОВКА.md):
#   mkdir -p /opt/remnachillbot && cd /opt/remnachillbot
#   git clone https://github.com/Mrvibecodic/chill-remna-bot.git .
#   nano docker-compose.yml      # заменить 2 строки с токенами ниже
#   docker network create remnawave-network 2>/dev/null || true
#   docker compose up -d
#   # затем в Telegram боту: /start
#
# Стартует ТОЛЬКО бот, без базы. БД появляется по выбору в мастере:
#   • SQLite  — бот создаёт файл в томе bot-data;
#   • Postgres — бот сам допишет сюда сервис db и поднимет его (через docker.sock).
# Поэтому проброшены docker.sock и каталог проекта (самоменеджмент + /update).
#
# Если разворачиваете НЕ в /opt/remnachillbot — поправьте путь в volumes
# ("/opt/remnachillbot:/compose") и в COMPOSE_HOST_DIR.

name: remnachillbot

services:
  bot:
    image: ghcr.io/mrvibecodic/chill-remna-bot:latest
    pull_policy: always
    container_name: remnabot
    restart: unless-stopped
    environment:
      BOT_TOKEN: "ВПИШИТЕ_ТОКЕН_БОТА"
      ADMIN_TELEGRAM_ID: "ВПИШИТЕ_ВАШ_TELEGRAM_ID"
      DATA_DIR: /data
      COMPOSE_PROJECT: remnachillbot
      COMPOSE_FILE_PATH: /compose/docker-compose.yml
      COMPOSE_HOST_DIR: /opt/remnachillbot
    volumes:
      - bot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/remnachillbot:/compose
    networks:
      - remnawave-network

volumes:
  bot-data:

networks:
  remnawave-network:
    external: true
