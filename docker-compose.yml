name: remnachillbot

services:
  bot:
    image: ghcr.io/mrvibecodic/chill-remna-bot:latest
    pull_policy: always
    container_name: remnabot
    restart: unless-stopped
    environment:
      BOT_TOKEN: "ВПИШИТЕ_ТОКЕН_БОТА"
      ADMIN_TELEGRAM_ID: "ВПИШИТЕ_ВАШ_TELEGRAM_ID"
      DATA_DIR: /data
      COMPOSE_PROJECT: remnachillbot
      COMPOSE_FILE_PATH: /compose/docker-compose.yml
      COMPOSE_HOST_DIR: /opt/remnachillbot
      PANEL_CONTAINER: remnawave
    volumes:
      - bot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/remnachillbot:/compose
      # Свой дизайн мини-аппа/кабинета: раскомментируйте и положите файлы в ./custom
      # (index.html — общий, miniapp.html / cabinet.html — раздельные; см. README)
      # - /opt/remnachillbot/custom:/custom:ro

volumes:
  bot-data:
